<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Failed – Canteen Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --primary:#b32020; --danger:#c0392b; --bg:#f0f4f8; --border:#d1dbe8; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:#b32020; min-height:100vh; }
    .navbar { background:var(--primary); height:60px; padding:0 2rem; display:flex; align-items:center; color:#fff; font-weight:700; font-size:1.1rem; gap:10px; }
    .wrap { max-width:480px; margin:3rem auto; padding:0 1.5rem; text-align:center; }
    .card { background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .card-top { background:var(--danger); padding:2.5rem; color:#fff; }
    .icon-circle { width:72px; height:72px; border-radius:50%; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; }
    .card-top h1 { font-size:1.4rem; font-weight:700; margin-bottom:6px; }
    .card-top p  { font-size:0.88rem; opacity:0.85; }
    .card-body { padding:1.8rem; }
    .card-body p { font-size:0.88rem; color:#6b7a92; line-height:1.6; }
    .btn { display:block; margin-top:1.4rem; background:var(--primary); color:#fff; padding:0.75rem; border-radius:8px; text-decoration:none; font-weight:600; font-size:0.92rem; }
    .btn-outline { display:block; margin-top:0.75rem; border:1.5px solid var(--primary); color:var(--primary); padding:0.72rem; border-radius:8px; text-decoration:none; font-weight:500; font-size:0.88rem; }
  </style>
</head>
<body>
<nav class="navbar">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 2h18l-2 7H5L3 2z"/><path d="M5 9c0 5.5 3 9 7 9s7-3.5 7-9"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
  Canteen Portal
</nav>
<div class="wrap">
  <div class="card">
    <div class="card-top">
      <div class="icon-circle">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <h1>Payment Failed</h1>
      <p>We could not process your payment.</p>
    </div>
    <div class="card-body">
      <p>Your payment was not completed. No amount has been deducted. Please try again or use a different payment method.</p>
      <a class="btn" href="/checkout">Try Again</a>
      <a class="btn-outline" href="/">Back to Home</a>
    </div>
  </div>
</div>
</body>
</html>
