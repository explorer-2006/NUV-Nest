<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Past Orders — NUV Nest</title>
  <style>
    /* ══════════════════════════════════════════════════════════
       NUV Nest — Past Orders Page Styles
       ══════════════════════════════════════════════════════════ */

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }

    .container { max-width: 800px; margin: 40px auto; padding: 20px; }
    h1 { color: #c41e3a; margin-bottom: 24px; }

    /* ── Order card ── */
    .order-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border: 1px solid transparent; /* overridden for failed orders */
    }

    /* Failed order — faint red tint so it stands out at a glance */
    .order-card.order-failed {
      border-color: rgba(153, 27, 27, 0.2);
      background: #fff8f8;
    }

    /* ── Card header ── */
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start; /* flex-start so badge sits under the total */
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }

    /* Right-hand column: total + status badge stacked vertically */
    .order-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .order-id   { font-weight: 600; color: #333; }
    .order-date { color: #888; font-size: 14px; margin: 2px 0 6px; }

    .order-total { font-size: 20px; font-weight: 700; color: #c41e3a; }
    /* Mute the total colour when payment failed */
    .order-total.total-failed { color: #991b1b; opacity: 0.7; }

    /* ── Payment status badge ── */
    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .status-badge.success { background: #dcfce7; color: #166534; }
    .status-badge.failed  { background: #fee2e2; color: #991b1b; }

    /* Failure reason shown below the badge in smaller muted text */
    .failure-reason {
      font-size: 0.72rem;
      color: #991b1b;
      margin-top: 2px;
      text-align: right;
      max-width: 200px;
    }

    /* ── Slot & canteen badges ── */
    .time-slot {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
    }
    .canteen-badge {
      display: inline-block;
      background: #fff3e0;
      color: #e65100;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      margin-left: 8px;
    }

    /* ── Item rows ── */
    .items-list { margin-top: 12px; }
    .item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .item:last-child { border-bottom: none; }
    .item-name  { color: #555; }
    .item-price { color: #888; font-size: 14px; }

    /* ── States ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .empty-state h2 { color: #333; margin-bottom: 8px; }

    .loading { text-align: center; padding: 40px; color: #888; }

    .error { text-align: center; padding: 40px; color: #c41e3a; }
    .error a { color: #c41e3a; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Your Orders</h1>

    <!--
      orders.js targets this element.
      It renders order cards (including failed-payment cards) into here.
    -->
    <div id="orders-container">
      <div class="loading">Loading your orders...</div>
    </div>
  </div>

  <!-- All rendering logic lives in orders.js -->
  <script src="{{ url_for('static', filename='js/orders.js') }}"></script>
</body>
</html>
