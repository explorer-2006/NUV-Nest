<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Orders — NUV Nest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { color: #c41e3a; margin-bottom: 24px; }
        .order-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .order-id { font-weight: 600; color: #333; }
        .order-date { color: #888; font-size: 14px; }
        .order-total { font-size: 20px; font-weight: 700; color: #c41e3a; }
        .items-list { margin-top: 12px; }
        .item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .item-name { color: #555; }
        .item-price { color: #888; font-size: 14px; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .empty-state h2 { color: #333; margin-bottom: 8px; }
        .loading { text-align: center; padding: 40px; color: #888; }
        .error { text-align: center; padding: 40px; color: #c41e3a; }
        .time-slot {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            margin-top: 8px;
        }
        .canteen-badge {
            display: inline-block;
            background: #fff3e0;
            color: #e65100;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            margin-left: 8px;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <h1>📋 Your Orders</h1>
        <div id="orders-container">
            <div class="loading">Loading your orders...</div>
        </div>
    </div>

    <script>
        // Fetch orders when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
        });

        function loadOrders() {
            const container = document.getElementById('orders-container');

            // Use the NEW endpoint — no user_id needed!
            fetch('/api/orders')
                .then(response => {
                    console.log('Response status:', response.status);
                    if (!response.ok) {
                        if (response.status === 403) {
                            throw new Error('Please log in to view orders');
                        }
                        throw new Error('Failed to load orders (HTTP ' + response.status + ')');
                    }
                    return response.json();
                })
                .then(orders => {
                    console.log('Orders received:', orders);

                    if (!Array.isArray(orders)) {
                        console.error('Expected array, got:', orders);
                        throw new Error('Invalid response format');
                    }

                    if (orders.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <h2>No orders yet</h2>
                                <p>Place your first order from the canteen!</p>
                            </div>
                        `;
                        return;
                    }

        const CANTEEN_NAMES = {
                        '1': 'Main Cafe',
                        '2': 'Tea Post',
                        '3': 'Tropical Bistro',
                    };

                    container.innerHTML = orders.map(order => `
                        <div class="order-card">
                            <div class="order-header">
                                <div>
                                    <div class="order-id">Order #${order.order_id}</div>
                                    <div class="order-date">${order.created_at || 'Recent'}</div>
                                    <span class="time-slot">⏰ ${order.time_slot}</span>
                                    <span class="canteen-badge">${CANTEEN_NAMES[order.canteen_id] || 'Canteen ' + (order.canteen_id || '1')}</span>
                                </div>
                                <div class="order-total">₹${order.total}</div>
                            </div>
                            <div class="items-list">
                                ${order.items.map(item => `
                                    <div class="item">
                                        <span class="item-name">${item.name} × ${item.qty}</span>
                                        <span class="item-price">₹${item.price * item.qty}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('');
                })
                .catch(error => {
                    console.error('Error loading orders:', error);
                    container.innerHTML = `
                        <div class="error">
                            <h3>⚠️ ${error.message}</h3>
                            <p><a href="/login">Log in</a> to view your orders</p>
                        </div>
                    `;
                });
        }
    </script>
</body>
</html>
