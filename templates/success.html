<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Successful – Canteen Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --primary:#b32020; --success:#16a34a; --bg:#f0f4f8; --border:#d1dbe8; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:#1e2a3a; min-height:100vh; }
    .navbar { background:var(--primary); height:60px; padding:0 2rem; display:flex; align-items:center; color:#fff; font-weight:700; font-size:1.1rem; gap:10px; }
    .wrap { max-width:560px; margin:3rem auto; padding:0 1.5rem; }
    .card { background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .card-top { background:var(--success); padding:2.5rem; text-align:center; color:#fff; }
    .icon-circle { width:72px; height:72px; border-radius:50%; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; }
    .card-top h1 { font-size:1.5rem; font-weight:700; margin-bottom:6px; }
    .card-top p  { font-size:0.88rem; opacity:0.85; }
    .card-body { padding:1.8rem; }
    .detail-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eef1f6; font-size:0.88rem; }
    .detail-row:last-child { border:none; }
    .detail-label { color:#6b7a92; }
    .detail-val   { font-weight:600; }
    .btn { display:block; text-align:center; margin-top:1.5rem; background:var(--primary); color:#fff; padding:0.75rem; border-radius:8px; text-decoration:none; font-weight:600; font-size:0.92rem; }
    .btn:hover { background:#b32020; }
  </style>
</head>
<body>
<nav class="navbar">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 2h18l-2 7H5L3 2z"/><path d="M5 9c0 5.5 3 9 7 9s7-3.5 7-9"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
  Canteen Portal
</nav>
<div class="wrap">
  <div class="card">
    <div class="card-top">
      <div class="icon-circle">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1>Payment Successful!</h1>
      <p>Your canteen order has been confirmed.</p>
    </div>
    <div class="card-body">
      <div class="detail-row">
        <span class="detail-label">Customer</span>
        <span class="detail-val">{{ order.user_name }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Canteen</span>
        <span class="detail-val">{{ order.canteen_name }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Pickup Slot</span>
        <span class="detail-val">{{ order.time_slot }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Amount Paid</span>
        <span class="detail-val" style="color:var(--success)">₹{{ total }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Payment ID</span>
        <span class="detail-val" style="font-size:0.78rem; font-family:monospace">{{ payment_id }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Order ID</span>
        <span class="detail-val" style="font-size:0.78rem; font-family:monospace">{{ order_id }}</span>
      </div>
      <a class="btn" href="/">Back to Home</a>
    </div>
  </div>
</div>
</body>
</html>
